name: update-zbpro-static

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-zbpro-static
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate ZBPRO static files
        env:
          mzbproPrefix: zbpro-
        run: node fetchURLByzbpro.js

      - name: Commit playlist files
        run: |
          if ! git diff --quiet --exit-code || [ -n "$(git status --porcelain)" ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add zbpro-interface.txt zbpro-interfaceTXT.txt zbpro-playback.xml utils/datas.js
            git commit -m "Update ZBPRO static playlist"
            git push
          fi
